# .pages.yml 最简配置（直接复制可用）
site:
  title: 2249554505.github.io
  media: images

content:
  - name: home
    label: 首页内容
    path: ./
    filename: home.md   # 重点：固定文件名！
    type: document
    fields:
      - name: title
        label: 标题
        type: string
      - name: body
        label: 内容
        type: markdown