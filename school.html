<div class="content">
  <h2>学校简介</h2>
  <p>
    娄底市艺术职业学校坐落于湖南省娄底市，是经教育行政部门批准设立的公办全日制中等职业学校，
    具有悠久的办学历史与鲜明的艺术办学特色。
  </p>
  <p>
    学校秉承“立德、笃学、精艺、笃行”的校训，坚持以艺育人、德艺双馨的办学理念，
    配备专业素养过硬的师资队伍，拥有完善的教学设施与实训场地，
    为学生提供优质的学习环境与发展平台。
  </p>
  <p>
    学校立足职业教育发展需求，不断深化教育教学改革，注重学生实践能力与创新能力培养，
    毕业生升学与就业前景良好，深受社会各界好评，是湘中地区艺术职业教育的优质品牌学校。
  </p>
